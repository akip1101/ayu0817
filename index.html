<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Dashboard</title>
    <!-- Google Fonts: 丸みのある可愛い日本語・英語フォント -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #fff0f3;
            --main-pink: #ff8fa9;
            --dark-pink: #ff6b8b;
            --soft-pink: #ffe3e9;
            --text-color: #5a4b4e;
            --text-muted: #a68a90;
            --card-bg: #ffffff;
            --border-radius: 24px;
            --font-main: 'M PLUS Rounded 1c', sans-serif;
            --font-eng: 'Fredoka', sans-serif;
        }

        body {
            font-family: var(--font-main);
            font-weight: 700;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            display: flex;
            min-height: 100vh;
        }

        /* 🔒 ロック画面 */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('https://www.sanrio.co.jp/wp-content/uploads/2022/06/list-mymelody.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2000;
            transition: opacity 0.5s ease;
        }
        #lock-screen::before {
            content: '';
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(255, 242, 245, 0.82);
            z-index: -1;
        }

        .lock-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(255, 255, 255, 0.7);
            padding: 35px 40px;
            border-radius: 32px;
            border: 3px solid #ffffff;
            box-shadow: 0 12px 32px rgba(255, 143, 169, 0.15);
            backdrop-filter: blur(4px);
        }

        #lock-screen h2 {
            font-size: 1.4rem; font-family: var(--font-eng);
            color: var(--dark-pink); margin: 0 0 20px 0;
            letter-spacing: 2px;
        }
        #lock-screen input {
            background: #ffffff; border: 2.5px solid var(--soft-pink);
            border-radius: 30px; padding: 14px; font-size: 1.2rem;
            width: 220px; text-align: center; outline: none; margin-bottom: 20px;
            color: var(--text-color); font-family: var(--font-eng);
            box-shadow: inset 0 2px 4px rgba(255, 143, 169, 0.05);
            transition: border-color 0.2s;
        }
        #lock-screen input:focus { border-color: var(--main-pink); }
        #lock-screen button {
            background-color: var(--main-pink); color: white; border: none;
            padding: 14px 60px; border-radius: 30px; font-size: 1rem;
            cursor: pointer; font-weight: 700; font-family: var(--font-eng);
            box-shadow: 0 6px 14px rgba(255, 143, 169, 0.3);
            transition: transform 0.1s, background-color 0.2s;
        }
        #lock-screen button:active { transform: scale(0.98); }

        /* 🎀 ナビゲーション */
        .sidebar {
            width: 110px; background-color: #fffbfa; border-right: 3px solid var(--soft-pink);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
            position: fixed; top: 0; bottom: 0; left: 0; z-index: 100;
        }
        .sidebar-menu { display: flex; flex-direction: column; gap: 15px; width: 100%; margin-top: 20px; }
        
        .nav-item {
            display: flex; flex-direction: column; align-items: center;
            background: transparent; border: none; cursor: pointer;
            color: var(--text-muted); font-size: 0.75rem; font-weight: 700; gap: 8px; padding: 15px 0;
            transition: all 0.2s;
            width: 100%;
        }
        .nav-item.active, .nav-item:hover {
            color: var(--dark-pink); background-color: #ffeef2;
            border-radius: 16px; width: calc(100% - 16px); margin: 0 8px;
        }
        .nav-icon-img {
            width: 52px; height: 52px;
            border-radius: 50%;
            border: 2.5px solid var(--soft-pink);
            object-fit: cover;
            background-color: white;
            transition: transform 0.2s;
        }
        .nav-item:hover .nav-icon-img { transform: scale(1.05); }
        .bottom-nav { display: none; }

        /* 🏠 メインレイアウト */
        .main-wrapper {
            margin-left: 110px; flex: 1; display: flex; flex-direction: column;
            padding: 25px; box-sizing: border-box; width: calc(100% - 110px);
        }

        .header-section { text-align: center; margin-bottom: 25px; }

        .user-tabs {
            display: flex; background: #ffffff; border-radius: 24px;
            padding: 5px; border: 2.5px solid var(--soft-pink); margin: 0 auto; max-width: 300px;
            box-shadow: 0 4px 10px rgba(255, 143, 169, 0.03);
        }
        .tab-btn {
            flex: 1; background: transparent; border: none; padding: 10px;
            border-radius: 20px; font-size: 0.85rem; color: var(--text-muted);
            cursor: pointer; font-weight: 700; transition: all 0.2s;
        }
        .tab-btn.active { background: var(--main-pink); color: white; box-shadow: 0 4px 10px rgba(255, 143, 169, 0.2); }

        .view-content { display: none; }
        .view-content.active { display: block; }

        .dashboard-grid {
            display: grid; grid-template-columns: 300px 1fr 300px; gap: 20px; align-items: start;
        }

        .notebook-card {
            background-color: var(--card-bg); border: 3px solid var(--soft-pink);
            border-radius: var(--border-radius); padding: 22px;
            box-shadow: 0 8px 16px rgba(255, 143, 169, 0.04); margin-bottom: 20px;
            position: relative;
        }
        .card-title { font-family: var(--font-main); font-size: 1.15rem; color: var(--dark-pink); margin: 0 0 6px 0; text-align: center; }
        .card-subtitle { font-size: 0.75rem; color: var(--text-muted); text-align: center; margin-bottom: 18px; }

        .point-display-container { text-align: center; margin-bottom: 15px; background-color: var(--bg-color); padding: 14px; border-radius: 18px; }
        .point-val { font-size: 2.4rem; color: var(--dark-pink); font-family: var(--font-eng); margin: 0; }
        .study-time-val { font-size: 1.15rem; color: var(--text-color); margin: 0; }

        .progress-bar-bg { background: #ffe3e9; height: 14px; border-radius: 7px; width: 100%; overflow: hidden; margin-top: 6px; }
        .progress-bar-fill { background: linear-gradient(90deg, #ff9ebb, var(--main-pink)); height: 100%; width: 0%; border-radius: 7px; transition: width 0.5s ease; }

        .form-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 18px; }
        label { font-size: 0.85rem; color: var(--text-color); margin-left: 4px; }
        input[type="text"], input[type="number"], select {
            width: 100%; padding: 11px 14px; border: 2.5px solid var(--soft-pink); border-radius: 14px;
            font-family: var(--font-main); font-size: 0.9rem; color: var(--text-color); box-sizing: border-box; outline: none;
            transition: border-color 0.2s;
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus { border-color: var(--main-pink); }
        
        .slider { -webkit-appearance: none; width: 100%; height: 8px; border-radius: 4px; background: #fff; outline: none; border: 2px solid var(--soft-pink); }
        .slider::-webkit-slider-thumb { -webkit-appearance: none; width: 22px; height: 22px; border-radius: 50%; background: var(--main-pink); border: 2.5px solid #fff; cursor: pointer; box-shadow: 0 2px 6px rgba(255, 143, 169, 0.2); }

        .btn-execute {
            width: 100%; background-color: var(--main-pink); color: white; padding: 13px;
            border-radius: 16px; border: none; font-size: 0.95rem; cursor: pointer; font-weight: 700;
            box-shadow: 0 4px 10px rgba(255, 143, 169, 0.2); transition: background-color 0.2s, transform 0.1s;
        }
        .btn-execute:hover { background-color: var(--dark-pink); }
        .btn-execute:active { transform: scale(0.99); }

        .item-list { list-style: none; padding: 0; margin: 0; }
        .list-entry {
            background: var(--bg-color); padding: 15px; border-radius: 16px;
            margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center;
        }
        .entry-info { display: flex; flex-direction: column; gap: 4px; }
        .entry-title { font-size: 0.95rem; color: var(--text-color); }
        .entry-meta { font-size: 0.75rem; color: var(--text-muted); }
        
        .btn-action { background: transparent; border: none; cursor: pointer; font-size: 1.1rem; opacity: 0.5; transition: opacity 0.2s; }
        .btn-action:hover { opacity: 1; }

        .danger-zone { display: flex; justify-content: center; gap: 15px; margin: 30px 0 50px 0; }
        .btn-sub { background: #ffffff; border: 2px solid var(--soft-pink); padding: 8px 16px; border-radius: 12px; font-size: 0.75rem; cursor: pointer; color: var(--text-color); font-weight: 700; }

        @media (max-width: 900px) {
            body { flex-direction: column; }
            .sidebar { display: none; }
            .bottom-nav {
                display: flex; position: fixed; bottom: 0; left: 0; right: 0; height: 75px;
                background-color: #fffbfa; border-top: 3px solid var(--soft-pink);
                justify-content: space-around; align-items: center; z-index: 1000;
            }
            .bottom-nav .nav-item { padding: 0; flex: 1; height: 100%; }
            .main-wrapper { margin-left: 0; width: 100%; padding: 15px 15px 90px 15px; }
            .dashboard-grid { grid-template-columns: 1fr; gap: 15px; }
            .nav-icon-img { width: 46px; height: 46px; }
            .nav-item.active, .nav-item:hover { border-radius: 0; width: 100%; margin: 0; }
        }
    </style>
</head>
<body>

    <!-- ロック画面 -->
    <div id="lock-screen">
        <div class="lock-container">
            <h2>ENTER PASSWORD</h2>
            <input type="password" id="pass-input">
            <button onclick="checkPassword()">Open</button>
        </div>
    </div>

    <!-- 🎀 PC用サイドメニュー -->
    <aside class="sidebar">
        <div class="sidebar-menu">
            <button class="nav-item active" onclick="switchView('dashboard')">
                <img class="nav-icon-img" src="https://www.sanrio.co.jp/wp-content/uploads/2022/06/mv-cinnamon.png" alt="ダッシュボード">
                ダッシュボード
            </button>
            <button class="nav-item" onclick="switchView('rewards')">
                <img class="nav-icon-img" src="https://www.sanrio.co.jp/wp-content/uploads/2022/06/list-kuromi.png" alt="ご褒美ストア">
                ご褒美ストア
            </button>
            <button class="nav-item" onclick="switchView('goals')">
                <img class="nav-icon-img" src="https://www.sanrio.co.jp/wp-content/uploads/2022/06/list-pompompurin.png" alt="目標設定">
                目標設定
            </button>
        </div>
    </aside>

    <!-- 📱 スマホ用ボトムメニュー -->
    <nav class="bottom-nav">
        <button class="nav-item active" onclick="switchView('dashboard')">
            <img class="nav-icon-img" src="https://www.sanrio.co.jp/wp-content/uploads/2022/06/mv-cinnamon.png" alt="ダッシュボード">
            ダッシュボード
        </button>
        <button class="nav-item" onclick="switchView('rewards')">
            <img class="nav-icon-img" src="https://www.sanrio.co.jp/wp-content/uploads/2022/06/list-kuromi.png" alt="ご褒美ストア">
            ご褒美ストア
        </button>
        <button class="nav-item" onclick="switchView('goals')">
            <img class="nav-icon-img" src="https://www.sanrio.co.jp/wp-content/uploads/2022/06/list-pompompurin.png" alt="目標設定">
            目標設定
        </button>
    </nav>

    <!-- メインコンテンツ -->
    <main class="main-wrapper">
        
        <!-- ヘッダー -->
        <header class="header-section">
            <div class="user-tabs">
                <button id="tab-ayu" class="tab-btn active" onclick="switchUser('ayu')">あゆ用</button>
                <button id="tab-ayaki" class="tab-btn" onclick="switchUser('ayaki')">あやき用</button>
            </div>
        </header>

        <!-- 🏠 ① ダッシュボード画面 -->
        <div id="view-dashboard" class="view-content active">
            <div class="dashboard-grid">
                
                <!-- 左列: ステータス -->
                <section class="notebook-card">
                    <h3 class="card-title">進捗状況</h3>
                    <p class="card-subtitle">現在の状況</p>
                    
                    <div class="point-display-container">
                        <div style="font-size:0.75rem; color:var(--text-muted)">まるちぽいんと</div>
                        <div class="point-val"><span id="dash-points">0</span><span style="font-size:1rem; margin-left:4px;">pt</span></div>
                    </div>
                    <div class="point-display-container">
                        <div style="font-size:0.75rem; color:var(--text-muted)">ごうけいべんきょう時間</div>
                        <div class="study-time-val" id="dash-study-time">0h 00m</div>
                    </div>
                    <div>
                        <div style="display:flex; justify-content:space-between; font-size:0.7rem; color:var(--text-muted);">
                            <span>今週のもくひょう達成率</span>
                            <span id="dash-progress-text">0%</span>
                        </div>
                        <div class="progress-bar-bg"><div id="dash-progress-bar" class="progress-bar-fill"></div></div>
                    </div>
                </section>

                <!-- 中列: クイック勉強きろく (教科から自由記述に変更) -->
                <section class="notebook-card">
                    <h3 class="card-title">勉強記録</h3>
                    <p class="card-subtitle">勉強時間をさくっと記録</p>
                    
                    <div class="form-group">
                        <label>何をした？（内容・教材など）:</label>
                        <input type="text" id="quick-content" placeholder="例: 数学の基礎問題、単語帳など">
                    </div>
                    <div class="form-group">
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem;">
                            <label>勉強した時間:</label>
                            <span id="quick-hours-label">1.0時間 (+1.0pt)</span>
                        </div>
                        <input type="range" id="quick-hours" class="slider" min="0.5" max="12" step="0.5" value="1" oninput="updateQuickLabel(this.value)">
                    </div>
                    <button class="btn-execute" onclick="submitQuickLog()">記録をノートに書く</button>
                </section>

                <!-- 右列: 最近のうごき -->
                <section class="notebook-card">
                    <h3 class="card-title">活動履歴</h3>
                    <p class="card-subtitle">最新の履歴ログ</p>
                    <ul class="item-list" id="dash-history-list" style="max-height: 280px; overflow-y: auto;"></ul>
                </section>

            </div>
        </div>

        <!-- 🎁 ② ご褒美ストア画面 -->
        <div id="view-rewards" class="view-content">
            <div class="dashboard-grid" style="grid-template-columns: 1fr 2fr;">
                <!-- 左側: ご褒美作成 -->
                <section class="notebook-card">
                    <h3 class="card-title">ご褒美作成</h3>
                    <p class="card-subtitle">新しいご褒美をつくる</p>
                    <div class="form-group">
                        <label>ご褒美の名前:</label>
                        <input type="text" id="reward-name">
                    </div>
                    <div class="form-group">
                        <label>ひつようなポイント:</label>
                        <input type="number" id="reward-cost" min="1" value="5">
                    </div>
                    <button class="btn-execute" onclick="submitRewardItem()">ストアへ並べる</button>
                </section>
                <!-- 右側: 交換所 -->
                <section class="notebook-card">
                    <h3 class="card-title">ご褒美ストア</h3>
                    <p class="card-subtitle">ポイントをつかって交換しよう！ (所持: <span id="shop-points" style="color:var(--dark-pink)">0</span>pt)</p>
                    <div id="shop-container" class="dashboard-grid" style="grid-template-columns: 1fr 1fr; gap:15px;"></div>
                </section>
            </div>
        </div>

        <!-- 📊 ③ 目標設定画面 -->
        <div id="view-goals" class="view-content">
            <section class="notebook-card" style="max-width: 500px; margin: 0 auto;">
                <h3 class="card-title">目標設定</h3>
                <p class="card-subtitle">今週の目標勉強時間をきめる</p>
                <div class="form-group">
                    <label>目標時間 (時間単位):</label>
                    <input type="number" id="input-goal-hours" min="1" value="45">
                </div>
                <button class="btn-execute" onclick="submitGoalSettings()">目標時間をほぞんする</button>
            </section>
        </div>

        <!-- ⚙️ バックアップ等管理 -->
        <footer class="danger-zone">
            <button class="btn-sub" onclick="alert('データ連携完了後に自動保存されます')">データ同期</button>
            <button class="btn-sub" style="color:var(--dark-pink)" onclick="triggerResetFlow()">全データの初期化</button>
        </footer>

    </main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB_MD8LTgOjwg_-SO8_Gcb8RLZmqc2iItw",
            authDomain: "gohoubipt.firebaseapp.com",
            databaseURL: "https://gohoubipt-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "gohoubipt",
            storageBucket: "gohoubipt.appspot.com",
            messagingSenderId: "133130532450",
            appId: "1:133130532450:web:41476b156bb892e62e833b",
            measurementId: "G-DRQR6ZJQLE"
        };

        const SECRET_PASSWORD = "ayu";
        let db;
        let currentUser = 'ayu';
        let currentPoints = 0;
        let currentGoal = 45;
        let dbListenerRef = null;

        function checkPassword() {
            const inputEl = document.getElementById("pass-input");
            if (inputEl.value === SECRET_PASSWORD) {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                document.getElementById("lock-screen").style.opacity = "0";
                setTimeout(() => { document.getElementById("lock-screen").style.display = "none"; }, 500);
                startListening();
            } else {
                alert("パスワードがちがいます！");
                inputEl.value = "";
            }
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                if(btn.getAttribute('onclick').includes(viewName)) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function switchUser(userKey) {
            if (currentUser === userKey) return;
            currentUser = userKey;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${userKey}`).classList.add('active');
            if (dbListenerRef) dbListenerRef.off();
            startListening();
        }

        function startListening() {
            dbListenerRef = db.ref(`data/${currentUser}`);
            dbListenerRef.on("value", (snapshot) => {
                const data = snapshot.val() || {};
                currentPoints = data.points || 0;
                currentGoal = data.goalHours || 45;

                const pointsElems = ['dash-points', 'shop-points'];
                pointsElems.forEach(id => {
                    const elem = document.getElementById(id);
                    if(elem) elem.innerText = currentPoints;
                });
                
                const goalInput = document.getElementById("input-goal-hours");
                if(goalInput) goalInput.value = currentGoal;

                renderHistory(data.history || {});
                renderRewards(data.rewardStore || {});
            });
        }

        function updateQuickLabel(val) {
            document.getElementById('quick-hours-label').innerText = `${val}時間 (+${val}pt)`;
        }

        function submitQuickLog() {
            let content = document.getElementById("quick-content").value.trim();
            if(!content) { content = "べんきょう"; } // 空欄の場合はデフォルト値
            
            const hours = parseFloat(document.getElementById("quick-hours").value);
            
            const newLogKey = db.ref().child(`data/${currentUser}/history`).push().key;
            db.ref(`data/${currentUser}`).transaction(data => {
                if (data) {
                    data.points = (data.points || 0) + hours;
                    if (!data.history) data.history = {};
                    data.history[newLogKey] = {
                        date: new Date().toLocaleDateString('ja-JP'),
                        timestamp: Date.now(),
                        action: `学習：${content} (${hours}h)`,
                        points: hours
                    };
                }
                return data;
            }, () => {
                document.getElementById("quick-content").value = ""; // 入力欄をクリア
            });
        }

        function renderHistory(historyMap) {
            const container = document.getElementById("dash-history-list");
            if(!container) return;
            container.innerHTML = "";
            const list = Object.keys(historyMap).map(k => ({key: k, ...historyMap[k]}));
            
            let totalMins = 0;
            let weeklyMins = 0;
            const startOfWeek = new Date();
            startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());
            startOfWeek.setHours(0,0,0,0);

            list.forEach(item => {
                if(item.action.includes('学習')) {
                    const match = item.action.match(/([\d.]+)h/);
                    if(match) {
                        const mins = parseFloat(match[1]) * 60;
                        totalMins += mins;
                        if((item.timestamp || 0) >= startOfWeek.getTime()) weeklyMins += mins;
                    }
                }
            });

            const h = Math.floor(totalMins / 60);
            const m = Math.floor(totalMins % 60);
            const timeElem = document.getElementById("dash-study-time");
            if(timeElem) timeElem.innerText = `${h}h ${m < 10 ? '0'+m : m}m`;

            let p = Math.floor(((weeklyMins/60) / currentGoal) * 100);
            if(p > 100) p = 100;
            const barElem = document.getElementById("dash-progress-bar");
            if(barElem) barElem.style.width = `${p}%`;
            const textElem = document.getElementById("dash-progress-text");
            if(textElem) textElem.innerText = `${p}%`;

            list.reverse().forEach(item => {
                const li = document.createElement("li");
                li.className = "list-entry";
                li.innerHTML = `
                    <div class="entry-info"><span class="entry-title">${item.action}</span><span class="entry-meta">${item.date}</span></div>
                    <div><span style="color:var(--dark-pink); margin-right:8px;">${item.points > 0 ? '+' : ''}${item.points}pt</span>
                    <button class="btn-action" onclick="deleteHistory('${item.key}')">🗑️</button></div>
                `;
                container.appendChild(li);
            });
        }

        function deleteHistory(key) {
            db.ref(`data/${currentUser}/history/${key}`).once("value").then(snap => {
                const item = snap.val();
                if(!item) return;
                if(currentPoints - item.points < 0) { alert("所持ポイントがマイナスになるため削除できません！"); return; }
                db.ref(`data/${currentUser}`).transaction(data => {
                    if (data) {
                        data.points -= item.points;
                        if(data.history) delete data.history[key];
                    }
                    return data;
                });
            });
        }

        function submitRewardItem() {
            const name = document.getElementById("reward-name").value.trim();
            const cost = parseInt(document.getElementById("reward-cost").value, 10);
            if(!name || isNaN(cost) || cost <= 0) { alert("ご褒美名と正しいポイントを入力してね！"); return; }

            const newKey = db.ref().child(`data/${currentUser}/rewardStore`).push().key;
            db.ref(`data/${currentUser}/rewardStore/${newKey}`).set({ name, cost }).then(() => {
                document.getElementById("reward-name").value = "";
                document.getElementById("reward-cost").value = 5;
            });
        }

        function renderRewards(storeMap) {
            const container = document.getElementById("shop-container");
            if(!container) return;
            container.innerHTML = "";
            Object.keys(storeMap).forEach(key => {
                const item = storeMap[key];
                const card = document.createElement("div");
                card.className = "notebook-card";
                card.style.textAlign = "center";
                card.style.padding = "15px";
                card.innerHTML = `
                    <div style="font-size:0.95rem; margin-bottom:8px;">${item.name}</div>
                    <div style="font-size:1.1rem; color:var(--dark-pink); font-family:var(--font-eng); margin-bottom:10px;">${item.cost} pt</div>
                    <button class="btn-execute" style="padding:6px; font-size:0.8rem;" onclick="exchangeReward('${item.name}', ${item.cost})">交換する</button>
                    <button class="btn-action" style="position:absolute; top:5px; right:5px; font-size:0.8rem;" onclick="deleteRewardStoreItem('${key}')">✕</button>
                `;
                container.appendChild(card);
            });
        }

        function exchangeReward(name, cost) {
            if(currentPoints < cost) { alert("ポイントが足りません！"); return; }
            if(!confirm(`「${name}」を ${cost}pt で交換しますか？`)) return;

            const newLogKey = db.ref().child(`data/${currentUser}/history`).push().key;
            db.ref(`data/${currentUser}`).transaction(data => {
                if (data) {
                    data.points = (data.points || 0) - cost;
                    if (!data.history) data.history = {};
                    data.history[newLogKey] = {
                        date: new Date().toLocaleDateString('ja-JP'),
                        timestamp: Date.now(),
                        action: `交換：${name}`,
                        points: -cost
                    };
                }
                return data;
            });
        }

        function deleteRewardStoreItem(key) {
            if(confirm("このご褒美アイテムをストアから削除しますか？")) db.ref(`data/${currentUser}/rewardStore/${key}`).remove();
        }

        function submitGoalSettings() {
            const hoursElem = document.getElementById("input-goal-hours");
            if(!hoursElem) return;
            const hours = parseInt(hoursElem.value, 10);
            if(isNaN(hours) || hours <= 0) { alert("正しい目標時間を入力してね！"); return; }
            db.ref(`data/${currentUser}/goalHours`).set(hours).then(() => {
                alert("目標時間を変更しました！");
                switchView('dashboard');
            });
        }

        function triggerResetFlow() {
            if(confirm("注意！現在のユーザーのすべてのデータ（ポイント、履歴）が完全に初期化されます。本当によろしいですか？")) {
                db.ref(`data/${currentUser}`).remove().then(() => alert("初期化が完了しました。"));
            }
        }
    </script>
</body>
</html>
