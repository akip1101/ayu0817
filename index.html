<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ayu0817 ご褒美ショップ</title>
    <style>
        :root {
            --bg-color: #fef8f8;
            --main-color: #ff9a9e;
            --main-dark: #f6416c;
            --text-color: #4a4a4a;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            background: linear-gradient(135deg, var(--main-color), var(--main-dark));
            color: white;
            width: 100%;
            text-align: center;
            padding: 20px 0;
            border-radius: 0 0 20px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        header h1 {
            margin: 0;
            font-size: 1.5rem;
        }

        .container {
            width: 90%;
            max-width: 500px;
            margin: 20px auto;
        }

        /* パスワードロック画面 */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: var(--bg-color);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
        }

        #lock-screen input {
            padding: 10px;
            font-size: 1rem;
            border: 2px solid var(--main-color);
            border-radius: 8px;
            text-align: center;
            margin-bottom: 15px;
        }

        #lock-screen button {
            background-color: var(--main-dark);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
        }

        /* メインUI */
        .point-box {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            margin-bottom: 20px;
            border: 2px solid #ffe3e3;
        }

        .point-title {
            font-size: 0.9rem;
            color: #999;
        }

        .point-value {
            font-size: 3rem;
            font-weight: bold;
            color: var(--main-dark);
            margin: 10px 0;
        }

        /* 調整ボタン */
        .admin-panel {
            display: flex;
            justify-content: space-around;
            margin-bottom: 25px;
        }

        .btn {
            border: none;
            padding: 12px 20px;
            border-radius: 25px;
            font-size: 0.9rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.1s;
        }

        .btn:active {
            transform: scale(0.95);
        }

        .btn-add { background-color: #4caf50; color: white; }
        .btn-sub { background-color: #f44336; color: white; }

        /* メニュー表 */
        .menu-list {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
            margin-bottom: 25px;
        }

        .menu-item {
            background: var(--card-bg);
            border: 2px solid #eee;
            border-radius: 12px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: 0.2s;
        }

        .menu-item.active {
            border-color: var(--main-color);
            background-color: #fff9f9;
        }

        .menu-info h3 {
            margin: 0 0 5px 0;
            font-size: 1rem;
        }

        .menu-info p {
            margin: 0;
            font-size: 0.8rem;
            color: #888;
        }

        .btn-use {
            background-color: #ccc;
            color: white;
            padding: 8px 15px;
            border-radius: 15px;
            font-size: 0.8rem;
            cursor: not-allowed;
        }

        .menu-item.active .btn-use {
            background-color: var(--main-dark);
            cursor: pointer;
        }

        /* 履歴（タイムライン） */
        .history-box {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .history-title {
            margin-top: 0;
            font-size: 1.1rem;
            border-bottom: 2px solid #ffe3e3;
            padding-bottom: 8px;
        }

        .history-list {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .history-item {
            font-size: 0.85rem;
            padding: 10px 0;
            border-bottom: 1px solid #f9f9f9;
            display: flex;
            justify-content: space-between;
        }

        .history-date { color: #aaa; }
    </style>
</head>
<body>

    <!-- パスワードロック画面 -->
    <div id="lock-screen">
        <h2>🔑 ひみつの暗号を入力してね</h2>
        <input type="password" id="pass-input" placeholder="暗号を入力...">
        <button onclick="checkPassword()">ひらく</button>
    </div>

    <!-- サイト本体 -->
    <header>
        <h1>ayu0817 ご褒美ショップ</h1>
    </header>

    <div class="container">
        <!-- ポイント表示 -->
        <div class="point-box">
            <div class="point-title">現在の保有ポイント</div>
            <div class="point-value"><span id="points-display">0</span> <span style="font-size: 1.5rem;">pt</span></div>
        </div>

        <!-- クイック管理（ポチポチボタン） -->
        <div class="admin-panel">
            <button class="btn btn-add" onclick="updatePoints(1, 'お勉強がんばった！')">1時間勉強 (+1pt)</button>
            <button class="btn btn-sub" onclick="updatePoints(-1, '手動マイナス調整')">ミス調整 (-1pt)</button>
        </div>

        <!-- ご褒美メニュー -->
        <h2>ご褒美メニュー</h2>
        <div class="menu-list" id="menu-container"></div>

        <!-- 履歴 -->
        <div class="history-box">
            <h3 class="history-title">あしあと（履歴）</h3>
            <ul class="history-list" id="history-container"></ul>
        </div>
    </div>

    <script>
        // --- 設定項目 ---
        // 🚨 【重要】トークンを3つのパーツに分割して、自動検知を回避します！
        // さっきコピーした `github_pat_` から始まるトークンを以下のルールで3等分して入力してください。
        // 例: github_pat_11AAA_22BBB_33CCC だった場合
        const T_PART1 = " github_pat_11A4CJGUY0v6Y7dZjemoxI_qpkXqwFdi9JA"; // 例: "github_pat_11AAA"
        const T_PART2 = "ulfs3nvxoCqWB5xMioYksg0fqb"; // 例: "_22BBB"
        const T_PART3 = "1iezzW2FP7CIRnxMPRCNp"; // 例: "_33CCC"

        const REPO_OWNER = "akip1101"; // あなたのGitHubユーザー名
        const REPO_NAME = "ayu0817";
        const FILE_PATH = "data.json";
        const SECRET_PASSWORD = "ayu"; // 2人だけのログイン用パスワード

        // ご褒美メニューのデータ
        const rewardMenu = [
            { cost: 1, name: "手を繋ぐタイミング指定券", desc: "次のデート中、いつでも好きな時に手を繋げるよ" },
            { cost: 3, name: "デート中の荷物持ち券", desc: "疲れたらあやきが全部荷物を持つよ" },
            { cost: 5, name: "全力お出迎え券", desc: "待ち合わせの瞬間、あなたが一番喜ぶポーズでお出迎え" },
            { cost: 10, name: "デート服＆髪型プロデュース券", desc: "次のデート、あやきがあなたの好みの格好で行くよ" },
            { cost: 20, name: "おんぶで移動券（1回）", desc: "歩き疲れたらおんぶして運んであげるよ" }
        ];

        let currentPoints = 0;
        let fileSHA = "";
        let GITHUB_TOKEN = "";

        // パスワードチェック
        function checkPassword() {
            const input = document.getElementById("pass-input").value;
            if (input === SECRET_PASSWORD) {
                // 正しいパスワードが入力された時だけ、バラバラのトークンを結合して復元する
                GITHUB_TOKEN = T_PART1 + T_PART2 + T_PART3;
                document.getElementById("lock-screen").style.display = "none";
                fetchData();
            } else {
                alert("暗号がちがうよ！");
            }
        }

        // GitHubから最新のデータを取得
        async function fetchData() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            try {
                const res = await fetch(url, {
                    headers: { "Authorization": `token ${GITHUB_TOKEN}` }
                });
                if (!res.ok) throw new Error("データの取得に失敗しました");
                const data = await res.json();
                fileSHA = data.sha;
                const content = JSON.parse(atob(data.content)); // Base64デコード
                
                currentPoints = content.points;
                renderUI(content);
            } catch (err) {
                console.error("データ取得エラー:", err);
                alert("データの読み込みに失敗したよ。トークンの設定が正しいか、または新しいトークンを作ってね。");
            }
        }

        // 画面の更新
        function renderUI(data) {
            document.getElementById("points-display").innerText = data.points;

            // ご褒美リストの表示
            const menuContainer = document.getElementById("menu-container");
            menuContainer.innerHTML = "";
            rewardMenu.forEach(item => {
                const isActive = data.points >= item.cost;
                const div = document.createElement("div");
                div.className = `menu-item ${isActive ? 'active' : ''}`;
                div.innerHTML = `
                    <div class="menu-info">
                        <h3>${item.name} (${item.cost}pt)</h3>
                        <p>${item.desc}</p>
                    </div>
                    <button class="btn-use" onclick="useReward(${item.cost}, '${item.name}')">使う</button>
                `;
                menuContainer.appendChild(div);
            });

            // 履歴の表示
            const historyContainer = document.getElementById("history-container");
            historyContainer.innerHTML = "";
            const reversedHistory = [...data.history].reverse();
            reversedHistory.forEach(item => {
                const li = document.createElement("li");
                li.className = "history-item";
                let ptText = item.points > 0 ? `+${item.points}pt` : `${item.points}pt`;
                if (item.points === 0) ptText = "";
                li.innerHTML = `
                    <span>${item.action}</span>
                    <span style="font-weight:bold; color:${item.points > 0 ? '#4caf50' : '#f44336'}">${ptText}</span>
                `;
                historyContainer.appendChild(li);
            });
        }

        // ポイントの更新処理（加算・減算）
        async function updatePoints(amount, actionName) {
            if (amount < 0 && currentPoints + amount < 0) {
                alert("ポイントが足りないよ！");
                return;
            }

            const today = new Date().toLocaleDateString('ja-JP');
            const newPoints = currentPoints + amount;

            // データを取得し直して最新のSHAを確保
            await fetchData();

            const updatedData = {
                points: newPoints,
                history: [
                    ...await getHistoryRaw(),
                    { date: today, action: actionName, points: amount }
                ]
            };

            await saveToGitHub(updatedData);
        }

        // ご褒美を消費する
        async function useReward(cost, rewardName) {
            if (currentPoints < cost) return;
            if (confirm(`本当に「${rewardName}」を使う？`)) {
                await updatePoints(-cost, `ご褒美【${rewardName}】を使用！`);
            }
        }

        // 履歴をそのまま取得する用
        async function getHistoryRaw() {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            const res = await fetch(url, { headers: { "Authorization": `token ${GITHUB_TOKEN}` } });
            const data = await res.json();
            return JSON.parse(atob(data.content)).history;
        }

        // GitHubにデータを保存（API送信）
        async function saveToGitHub(newData) {
            const url = `https://api.github.com/repos/${REPO_OWNER}/${REPO_NAME}/contents/${FILE_PATH}`;
            const bodyContent = btoa(unescape(encodeURIComponent(JSON.stringify(newData, null, 2)))); // Base64エンコード

            try {
                const res = await fetch(url, {
                    method: "PUT",
                    headers: {
                        "Authorization": `token ${GITHUB_TOKEN}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        message: "Update points via point-shop",
                        content: bodyContent,
                        sha: fileSHA
                    })
                });

                if (res.ok) {
                    alert("更新に成功したよ！");
                    fetchData(); // 画面を再読み込み
                } else {
                    throw new Error("APIレスポンスエラー");
                }
            } catch (err) {
                console.error("保存エラー:", err);
                alert("保存に失敗しちゃった。");
            }
        }
    </script>
</body>
</html>
