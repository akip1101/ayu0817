<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Study Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&family=Fredoka:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
    <style>
        :root {
            --bg-color: #fff0f3;
            --main-pink: #ff8fa9;
            --dark-pink: #ff6b8b;
            --soft-pink: #ffe3e9;
            --text-color: #5a4b4e;
            --text-muted: #a68a90;
            --card-bg: #ffffff;
            --border-radius: 24px;
            --font-main: 'M PLUS Rounded 1c', sans-serif;
            --font-eng: 'Fredoka', sans-serif;
            --bg-img: url('https://www.sanrio.co.jp/wp-content/uploads/2022/06/list-mymelody.png');
            --filter-color: rgba(255, 240, 243, 0.75);
        }

        /* ダークモード設定 */
        body.dark-mode {
            --bg-color: #2d1b20;
            --main-pink: #ff6b8b;
            --dark-pink: #ffb7c5;
            --soft-pink: #5a3e44;
            --text-color: #fce4e8;
            --text-muted: #d1a8b0;
            --card-bg: #3c282d;
            --bg-img: url('https://www.sanrio.co.jp/wp-content/uploads/2022/06/list-kuromi.png');
            --filter-color: rgba(45, 27, 32, 0.85);
        }

        body {
            font-family: var(--font-main);
            font-weight: 700;
            background-color: var(--bg-color); 
            background-image: linear-gradient(var(--filter-color), var(--filter-color)), var(--bg-img);
            background-size: 120px; 
            background-position: 0 0, 1000px 1000px; 
            background-repeat: repeat;
            background-attachment: fixed;
            color: var(--text-color);
            transition: all 0.3s ease;
            margin: 0; padding: 0; box-sizing: border-box; display: flex; min-height: 100vh;
        }

        /* 既存スタイルの調整 */
        .notebook-card { background-color: var(--card-bg); border: 3px solid var(--soft-pink); border-radius: var(--border-radius); padding: 22px; box-shadow: 0 8px 16px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .card-title { color: var(--dark-pink); }
        .btn-execute { width: 100%; background-color: var(--main-pink); color: white; padding: 13px; border-radius: 16px; border: none; cursor: pointer; }
        
        /* ロック画面・サイドバー等は既存のCSSを維持 */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f3; display: flex; justify-content: center; align-items: center; z-index: 2000; }
        .sidebar { width: 110px; background-color: rgba(255, 251, 250, 0.95); border-right: 3px solid var(--soft-pink); position: fixed; top: 0; bottom: 0; left: 0; z-index: 100; }
        .main-wrapper { margin-left: 110px; flex: 1; padding: 25px; }
        
        @media (max-width: 900px) { .sidebar { display: none; } .main-wrapper { margin-left: 0; } }
    </style>
</head>
<body>

    <div id="lock-screen">
        <div class="lock-container">
            <h2>ENTER PASSWORD</h2>
            <input type="password" id="pass-input">
            <button onclick="checkPassword()">Open</button>
        </div>
    </div>

    <aside class="sidebar">
        <div class="sidebar-menu">
            <button class="nav-item active" onclick="switchView('dashboard')">ダッシュボード</button>
            <button class="nav-item" onclick="switchView('rewards')">ご褒美ストア</button>
            <button class="nav-item" onclick="switchView('goals')">各種設定</button>
        </div>
    </aside>

    <main class="main-wrapper">
        <div id="view-dashboard" class="view-content active">
            <section class="notebook-card">
                <h3 class="card-title">勉強記録</h3>
                <select id="quick-category-select"></select>
                <button class="btn-execute" onclick="submitQuickLog()">記録を保存</button>
            </section>
        </div>

        <div id="view-goals" class="view-content">
            <section class="notebook-card">
                <h3 class="card-title">各種設定</h3>
                <p>ダークモード切替:</p>
                <button class="btn-execute" onclick="toggleDarkMode()">ON / OFF</button>
            </section>
        </div>
    </main>

    <script>
        // ダークモード切り替え関数
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
        }

        const firebaseConfig = {
            apiKey: "AIzaSyB_MD8LTgOjwg_-SO8_Gcb8RLZmqc2iItw",
            authDomain: "gohoubipt.firebaseapp.com",
            databaseURL: "https://gohoubipt-default-rtdb.asia-southeast1.firebasedatabase.app/",
            projectId: "gohoubipt",
            storageBucket: "gohoubipt.appspot.com",
            messagingSenderId: "133130532450",
            appId: "1:133130532450:web:41476b156bb892e62e833b",
            measurementId: "G-DRQR6ZJQLE"
        };

        const SECRET_PASSWORD = "ayu";
        let db;
        let currentUser = 'ayu';
        let currentPoints = 0;
        let currentGoal = 45;
        let dbListenerRef = null;
        let activeCategories = [];

        function checkPassword() {
            const inputEl = document.getElementById("pass-input");
            if (inputEl.value === SECRET_PASSWORD) {
                firebase.initializeApp(firebaseConfig);
                db = firebase.database();
                document.getElementById("lock-screen").style.opacity = "0";
                setTimeout(() => { document.getElementById("lock-screen").style.display = "none"; }, 500);
                startListening();
            } else {
                alert("パスワードがちがいます！");
                inputEl.value = "";
            }
        }

        function switchView(viewName) {
            document.querySelectorAll('.view-content').forEach(el => el.classList.remove('active'));
            document.getElementById(`view-${viewName}`).classList.add('active');
            
            document.querySelectorAll('.nav-item').forEach(btn => {
                if(btn.getAttribute('onclick').includes(viewName)) btn.classList.add('active');
                else btn.classList.remove('active');
            });
        }

        function switchUser(userKey) {
            if (currentUser === userKey) return;
            currentUser = userKey;
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(`tab-${userKey}`).classList.add('active');
            if (dbListenerRef) dbListenerRef.off();
            startListening();
        }

        function startListening() {
            dbListenerRef = db.ref(`data/${currentUser}`);
            dbListenerRef.on("value", (snapshot) => {
                const data = snapshot.val() || {};
                currentPoints = data.points || 0;
                currentGoal = data.goalHours || 45;

                const pointsElems = ['dash-points', 'shop-points'];
                pointsElems.forEach(id => {
                    const elem = document.getElementById(id);
                    if(elem) elem.innerText = currentPoints;
                });
                
                const goalInput = document.getElementById("input-goal-hours");
                if(goalInput) goalInput.value = currentGoal;

                activeCategories = data.categories ? Object.values(data.categories) : ["勉強"];
                renderCategoryDropdown(data.categories || {});
                renderCategorySettings(data.categories || {});

                renderHistory(data.history || {});
                renderRewards(data.rewardStore || {});
            });
        }

        function renderCategoryDropdown(catMap) {
            const select = document.getElementById("quick-category-select");
            if(!select) return;
            select.innerHTML = "";
            
            const list = Object.keys(catMap).map(k => catMap[k]);
            if(list.length === 0) {
                ["勉強"].forEach(cat => {
                    const opt = document.createElement("option");
                    opt.value = cat; opt.innerText = cat;
                    select.appendChild(opt);
                });
            } else {
                list.forEach(cat => {
                    const opt = document.createElement("option");
                    opt.value = cat; opt.innerText = cat;
                    select.appendChild(opt);
                });
            }
        }

        function renderCategorySettings(catMap) {
            const container = document.getElementById("custom-tags-container");
            if(!container) return;
            container.innerHTML = "";
            
            const entries = Object.keys(catMap).map(k => ({key: k, name: catMap[k]}));
            if(entries.length === 0) {
                container.innerHTML = `<p style="font-size:0.75rem; color:var(--text-muted); margin:4px 0 0 0;">まだ登録がありません。デフォルトの「勉強」が適用されています。</p>`;
                return;
            }

            entries.forEach(item => {
                const badge = document.createElement("div");
                badge.className = "tag-badge";
                badge.innerHTML = `
                    <span>${item.name}</span>
                    <span style="cursor:pointer; opacity:0.6; font-weight:normal;" onclick="deleteCustomCategory('${item.key}')">✕</span>
                `;
                container.appendChild(badge);
            });
        }

        function addCustomCategory() {
            const input = document.getElementById("input-new-category");
            const val = input.value.trim();
            if(!val) return;

            const newKey = db.ref().child(`data/${currentUser}/categories`).push().key;
            db.ref(`data/${currentUser}/categories/${newKey}`).set(val).then(() => {
                input.value = "";
            });
        }

        function deleteCustomCategory(key) {
            db.ref(`data/${currentUser}/categories/${key}`).remove();
        }

        function updateQuickLabel(val) {
            document.getElementById('quick-hours-label').innerText = `${val}時間 (+${val}pt)`;
        }

        function submitQuickLog() {
            const select = document.getElementById("quick-category-select");
            let content = select ? select.value : "勉強";
            const hours = parseFloat(document.getElementById("quick-hours").value);
            
            const newLogKey = db.ref().child(`data/${currentUser}/history`).push().key;
            db.ref(`data/${currentUser}`).transaction(data => {
                if (data) {
                    data.points = (data.points || 0) + hours;
                    if (!data.history) data.history = {};
                    data.history[newLogKey] = {
                        date: new Date().toLocaleDateString('ja-JP'),
                        timestamp: Date.now(),
                        action: `学習：${content} (${hours}h)`,
                        points: hours
                    };
                }
                return data;
            });
        }

        function renderHistory(historyMap) {
            const container = document.getElementById("dash-history-list");
            if(!container) return;
            container.innerHTML = "";
            const list = Object.keys(historyMap).map(k => ({key: k, ...historyMap[k]}));
            
            let totalMins = 0;
            let weeklyMins = 0;
            const startOfWeek = new Date();
            startOfWeek.setDate(startOfWeek.getDate() - startOfWeek.getDay());
            startOfWeek.setHours(0,0,0,0);

            list.forEach(item => {
                if(item.action && item.action.includes('学習')) {
                    const match = item.action.match(/([\d.]+)h/);
                    if(match) {
                        const mins = parseFloat(match[1]) * 60;
                        totalMins += mins;
                        if((item.timestamp || 0) >= startOfWeek.getTime()) weeklyMins += mins;
                    }
                }
            });

            const h = Math.floor(totalMins / 60);
            const m = Math.floor(totalMins % 60);
            const timeElem = document.getElementById("dash-study-time");
            if(timeElem) timeElem.innerText = `${h}h ${m < 10 ? '0'+m : m}m`;

            let p = Math.floor(((weeklyMins/60) / currentGoal) * 100);
            if(p > 100) p = 100;
            const barElem = document.getElementById("dash-progress-bar");
            if(barElem) barElem.style.width = `${p}%`;
            const textElem = document.getElementById("dash-progress-text");
            if(textElem) textElem.innerText = `${p}%`;

            list.reverse().forEach(item => {
                const li = document.createElement("li");
                li.className = "list-entry";
                
                const isStudyLog = item.action && item.action.includes('学習');
                const editButtonHtml = isStudyLog ? `<button class="btn-action" onclick="editHistory('${item.key}')">✏️</button>` : '';

                li.innerHTML = `
                    <div class="entry-info">
                        <span class="entry-title">${item.action}</span>
                        <span class="entry-meta">${item.date}</span>
                    </div>
                    <div style="display:flex; align-items:center; gap:4px;">
                        <span style="color:var(--dark-pink); margin-right:4px; font-size:0.85rem; white-space:nowrap;">${item.points > 0 ? '+' : ''}${item.points}pt</span>
                        ${editButtonHtml}
                        <button class="btn-action" onclick="deleteHistory('${item.key}')">🗑️</button>
                    </div>
                `;
                container.appendChild(li);
            });
        }

        function editHistory(key) {
            db.ref(`data/${currentUser}/history/${key}`).once("value").then(snap => {
                const item = snap.val();
                if (!item) return;

                let currentCat = "勉強";
                let currentHours = item.points;
                
                const catMatch = item.action.match(/学習：(.+?)\s*\(/);
                if (catMatch) currentCat = catMatch[1];

                const newCat = prompt("新しい科目・カテゴリ名を入力してください:", currentCat);
                if (newCat === null) return;

                const newHoursStr = prompt("新しい勉強時間（時間単位）を入力してください（例: 1.5）:", currentHours);
                if (newHoursStr === null) return;
                
                const newHours = parseFloat(newHoursStr);
                if (isNaN(newHours) || newHours <= 0) {
                    alert("正しい数値を入力してください。");
                    return;
                }

                db.ref(`data/${currentUser}`).transaction(data => {
                    if (data) {
                        const oldPoints = item.points;
                        const diff = newHours - oldPoints;

                        if ((data.points || 0) + diff < 0) {
                            alert("全体の所持ポイントがマイナスになってしまうため変更できません！");
                            return; 
                        }

                        data.points = (data.points || 0) + diff;
                        if (data.history && data.history[key]) {
                            data.history[key].action = `学習：${newCat.trim()} (${newHours}h)`;
                            data.history[key].points = newHours;
                        }
                    }
                    return data;
                });
            });
        }

        function deleteHistory(key) {
            db.ref(`data/${currentUser}/history/${key}`).once("value").then(snap => {
                const item = snap.val();
                if(!item) return;
                if(currentPoints - item.points < 0) { alert("所持ポイントがマイナスになるため削除できません！"); return; }
                db.ref(`data/${currentUser}`).transaction(data => {
                    if (data) {
                        data.points -= item.points;
                        if(data.history) delete data.history[key];
                    }
                    return data;
                });
            });
        }

        function submitRewardItem() {
            const name = document.getElementById("reward-name").value.trim();
            const cost = parseInt(document.getElementById("reward-cost").value, 10);
            if(!name || isNaN(cost) || cost <= 0) { alert("ご褒美名と正しいポイントを入力してね！"); return; }

            const newKey = db.ref().child(`data/${currentUser}/rewardStore`).push().key;
            db.ref(`data/${currentUser}/rewardStore/${newKey}`).set({ name, cost }).then(() => {
                document.getElementById("reward-name").value = "";
                document.getElementById("reward-cost").value = 5;
            });
        }

        function renderRewards(storeMap) {
            const container = document.getElementById("shop-container");
            if(!container) return;
            container.innerHTML = "";
            Object.keys(storeMap).forEach(key => {
                const item = storeMap[key];
                const card = document.createElement("div");
                card.className = "notebook-card";
                card.style.textAlign = "center";
                card.style.padding = "15px";
                card.innerHTML = `
                    <div style="font-size:0.95rem; margin-bottom:8px;">${item.name}</div>
                    <div style="font-size:1.1rem; color:var(--dark-pink); font-family:var(--font-eng); margin-bottom:10px;">${item.cost} pt</div>
                    <button class="btn-execute" style="padding:6px; font-size:0.8rem;" onclick="exchangeReward('${item.name}', ${item.cost})">交換する</button>
                    <button class="btn-action" style="position:absolute; top:5px; right:5px; font-size:0.8rem;" onclick="deleteRewardStoreItem('${key}')">✕</button>
                `;
                container.appendChild(card);
            });
        }

        function exchangeReward(name, cost) {
            if(currentPoints < cost) { alert("ポイントが足りません！"); return; }
            if(!confirm(`「${name}」を ${cost}pt で交換しますか？`)) return;

            const newLogKey = db.ref().child(`data/${currentUser}/history`).push().key;
            db.ref(`data/${currentUser}`).transaction(data => {
                if (data) {
                    data.points = (data.points || 0) - cost;
                    if (!data.history) data.history = {};
                    data.history[newLogKey] = {
                        date: new Date().toLocaleDateString('ja-JP'),
                        timestamp: Date.now(),
                        action: `交換：${name}`,
                        points: -cost
                    };
                }
                return data;
            });
        }

        function deleteRewardStoreItem(key) {
            if(confirm("このご褒美アイテムをストアから削除しますか？")) db.ref(`data/${currentUser}/rewardStore/${key}`).remove();
        }

        function submitGoalSettings() {
            const hoursElem = document.getElementById("input-goal-hours");
            if(!hoursElem) return;
            const hours = parseInt(hoursElem.value, 10);
            if(isNaN(hours) || hours <= 0) { alert("正しい目標時間を入力してね！"); return; }
            db.ref(`data/${currentUser}/goalHours`).set(hours).then(() => {
                alert("目標時間を変更しました！");
                switchView('dashboard');
            });
        }

        function triggerResetFlow() {
            if(confirm("注意！現在のユーザーのすべてのデータ（ポイント、履歴）が完全に初期化されます。本当によろしいですか？")) {
                db.ref(`data/${currentUser}`).remove().then(() => alert("初期化が完了しました。"));
            }
        }
    </script>
</body>
</html>
